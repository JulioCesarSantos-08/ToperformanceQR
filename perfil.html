<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Perfil - ToPerformance</title>
<link rel="stylesheet" href="perfil.css">
<link rel="icon" type="image/png" href="imagenes/logo1.png">
</head>

<body>

<header>
<img src="imagenes/logo1.png">
<span id="bienvenido">Bienvenido</span>
<button onclick="logout()">Salir</button>
</header>

<main class="container">

<!-- PANEL ADMIN -->
<section id="panelAdmin" style="display:none;">
<form id="adminForm">
<h3>Registrar Cliente</h3>

<input id="nombre" placeholder="Nombre completo" required>
<input id="correo" type="email" placeholder="Correo" required>
<input id="password" type="password" placeholder="Contraseña opcional">

<button type="button" onclick="altaCliente()">Guardar Cliente</button>
</form>
</section>

<!-- CONTENIDO CLIENTES / VEHÍCULOS -->
<section id="contenido"></section>

</main>

<!-- MODAL EDITAR CLIENTE -->
<div id="modalEditar" class="modal">
<div class="modal-content">
<h3>Editar Cliente</h3>

<form onsubmit="guardarEdicionCliente(event)">
<input id="editNombre" placeholder="Nombre">
<input id="editCorreo" placeholder="Correo">

<div class="modal-actions">
<button type="submit">Guardar</button>
<button type="button" onclick="closeModal()">Cancelar</button>
</div>

</form>
</div>
</div>

<!-- BOTONES FLOTANTES -->

target="_blank"
class="fab whatsapp">

</svg>
</a>

</div>

<script type="module" src="perfil.js"></script>

</body>
</html>
