<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Perfil - ToPerformance</title>
<link rel="stylesheet" href="perfil.css">
<link rel="icon" type="image/png" href="imagenes/logo1.png">
</head>

<body>

<header>
<img src="imagenes/logo1.png">
<span id="bienvenido">Bienvenido</span>
<button onclick="logout()">Salir</button>
</header>

<main class="container">

<section id="panelAdmin">
<form id="adminForm">
<h3>Registrar Cliente</h3>
<input id="nombre" placeholder="Nombre completo" required>
<input id="correo" type="email" placeholder="Correo" required>
<input id="password" type="password" placeholder="Contraseña opcional">
<input id="modelo" placeholder="Modelo vehículo" required>
<input id="placa" placeholder="Placa" required>
<input id="kilometraje" placeholder="Kilometraje actual" required>
<input id="imagen" placeholder="Imagen opcional">
<button type="button" onclick="altaCliente()">Guardar</button>
</form>
</section>

<section id="contenido"></section>

</main>

<div id="modalEditar" class="modal">
<div class="modal-content">
<h3>Editar Cliente</h3>
<form onsubmit="guardarEdicionCliente(event)">
<input id="editNombre" placeholder="Nombre">
<input id="editCorreo" placeholder="Correo">
<input id="editModelo" placeholder="Modelo">
<input id="editPlaca" placeholder="Placa">
<input id="editKilometraje" placeholder="Kilometraje">
<input id="editImagen" placeholder="Imagen">
<div class="modal-actions">
<button type="submit">Guardar</button>
<button type="button" onclick="closeModal()">Cancelar</button>
</div>
</form>
</div>
</div>

<button class="fab">+</button>

<script type="module" src="perfil.js"></script>

</body>
</html>
